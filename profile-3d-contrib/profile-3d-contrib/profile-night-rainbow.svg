<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500">
  <style>
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .bar { animation: slide 3s infinite; }
  </style>
  <rect width="1000" height="500" fill="#0D1117"/>
  <rect class="bar" x="0" y="50" width="200" height="30" fill="#00B4FF"/>
  <rect class="bar" x="0" y="100" width="250" height="30" fill="#0084FF" style="animation-delay: 0.5s"/>
  <rect class="bar" x="0" y="150" width="300" height="30" fill="#00D9FF" style="animation-delay: 1s"/>
  <rect class="bar" x="0" y="200" width="280" height="30" fill="#00B4FF" style="animation-delay: 1.5s"/>
  <rect class="bar" x="0" y="250" width="320" height="30" fill="#0084FF" style="animation-delay: 2s"/>
  <rect class="bar" x="0" y="300" width="270" height="30" fill="#00D9FF" style="animation-delay: 2.5s"/>
  <rect class="bar" x="0" y="350" width="290" height="30" fill="#00B4FF" style="animation-delay: 3s"/>
  <rect class="bar" x="0" y="400" width="260" height="30" fill="#0084FF" style="animation-delay: 3.5s"/>
</svg>
