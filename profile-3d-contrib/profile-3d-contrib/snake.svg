<svg viewBox="0 0 1000 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slither {
        0% { transform: translateX(-50px); }
        100% { transform: translateX(1000px); }
      }
      .snake-head {
        animation: slither 4s infinite;
      }
    </style>
  </defs>
  
  <rect width="1000" height="100" fill="#0D1117" stroke="#00B4FF" stroke-width="2"/>
  
  <!-- Kígyó feje -->
  <circle class="snake-head" cx="50" cy="50" r="15" fill="#00D9FF"/>
  
  <!-- Kígyó teste -->
  <circle class="snake-head" cx="30" cy="50" r="12" fill="#00B4FF" style="animation-delay: -0.1s"/>
  <circle class="snake-head" cx="10" cy="50" r="10" fill="#0084FF" style="animation-delay: -0.2s"/>
  
  <text x="500" y="60" font-size="20" fill="#00B4FF" text-anchor="middle" font-family="monospace">
    🐍 Contributing to the future...
  </text>
</svg>
