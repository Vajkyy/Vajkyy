<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100">
  <style>
    @keyframes move { 0% { transform: translateX(-50px); } 100% { transform: translateX(1050px); } }
    .snake { animation: move 4s infinite linear; }
  </style>
  <rect width="1000" height="100" fill="#0D1117" stroke="#00B4FF" stroke-width="2"/>
  <circle class="snake" cx="0" cy="50" r="15" fill="#00D9FF"/>
  <circle class="snake" cx="-20" cy="50" r="12" fill="#00B4FF" style="animation-delay: -0.1s"/>
  <circle class="snake" cx="-40" cy="50" r="10" fill="#0084FF" style="animation-delay: -0.2s"/>
  <text x="500" y="65" font-size="18" fill="#00B4FF" text-anchor="middle" font-family="monospace">🐍 Contributing...</text>
</svg>
